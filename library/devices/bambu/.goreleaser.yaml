version: 2
project_name: bambu-pp-cli
changelog:
  disable: true
builds:
  - id: bambu-pp-cli
    main: ./cmd/bambu-pp-cli
    binary: bambu-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/bambu/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: bambu-pp-mcp
    main: ./cmd/bambu-pp-mcp
    binary: bambu-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: bambu-pp-cli
    repository:
      owner: twidtwid
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Agent-ready Bambu print monitoring with exact plate previews and start/finish payloads."
    install: |
      bin.install "bambu-pp-cli"
      bin.install "bambu-pp-mcp"
