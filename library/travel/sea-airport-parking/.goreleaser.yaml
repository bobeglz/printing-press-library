version: 2
project_name: sea-airport-parking-pp-cli
changelog:
  disable: true
builds:
  - id: sea-airport-parking-pp-cli
    main: ./cmd/sea-airport-parking-pp-cli
    binary: sea-airport-parking-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/sea-airport-parking/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sea-airport-parking-pp-mcp
    main: ./cmd/sea-airport-parking-pp-mcp
    binary: sea-airport-parking-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sea-airport-parking-pp-cli
    repository:
      owner: omarshahine
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Check, track, and get alerted on SEA's official on-airport Reserved garage — with a local price/availability history and sold-out watch that no site or aggregator has."
    install: |
      bin.install "sea-airport-parking-pp-cli"
      bin.install "sea-airport-parking-pp-mcp"
